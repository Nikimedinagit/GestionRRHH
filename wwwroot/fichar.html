<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WorkSync | Asistencia</title>

  <link rel="shortcut icon" href="img/icono-logo.png" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="./css/Vistas/fichar.css">
</head>

<body>

  <div class="auth-wrapper">

    <div class="image-section">
      <div class="overlay-text">
        <h1>Asistencia Facial Inteligente</h1>
        <p>Registra tu entrada y salida al instante con la mayor seguridad y precisión.</p>
      </div>
      <video id="video" autoplay muted></video>
      <canvas id="canvas"></canvas>
      <div id="mensajeCamara" class="mensaje-camara">Cargando cámara...</div>
    </div>

    <div class="form-section">
      <div id="mensajeBackend" class="mensaje-backend-card"></div>


      <img src="./img/logo-completo.png" alt="Logo" class="logo-img">
      <p class="asistencia-subtitle">Validá tu identidad para registrar tu jornada de forma rápida y segura.</p>

      <div class="form-group mb-0">
        <label class="text-primary font-weight-bold small">Tu DNI</label>
        <input type="text" id="dniInput" class="form-control" placeholder="Ingrese su DNI">
      </div>

      <button id="btnFichar" class="btn btn-fichar">Fichar</button>
      <button id="btnRegistrar" class="btn btn-registrar">Registrar Rostro</button>
      <button id="btnReintentar" class="btn btn-reintentar">Reintentar Captura</button>


    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="lib/face/face-api.min.js"></script>
  <script src="./js/Fichar/fichar.js"></script>
</body>

</html>
