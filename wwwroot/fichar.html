<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asistencia | WorkSync</title>
<link rel="stylesheet" href="./css/Fichar/fichar.css">
<style>
  /* Ajustes clave para cámara + canvas */
  .col-izq {
    width: 60%;
    background: #e9efff url('../../img/asistencia.svg') center/cover no-repeat;
    box-shadow: inset 0 0 60px #92a3ff44;
    position: relative; /* necesario para overlay */
    overflow: hidden;
  }

  .col-izq video,
  .col-izq canvas {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .mensaje-camara {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 1.6rem;
    font-weight: 700;
    color: #fff;
    text-align: center;
    padding: 15px 25px;
    background: rgba(0,0,0,0.6);
    border-radius: 10px;
    display: none;
    z-index: 50;
  }
</style>
</head>
<body>
<div class="contenedor">
  <div class="col-izq">
    <video id="video" autoplay muted></video>
    <div id="mensajeCamara" class="mensaje-camara"></div>
  </div>

  <div class="col-der">
    <img src="./img/logogris.png" alt="Logo">
    <h1 class="bienvenido-title">Asistencia</h1>
    <input type="text" id="dniInput" class="form-control" placeholder="Ingrese su DNI">
    <button id="btnFichar" class="btn btn-fichar">FICHAR</button>
    <button id="btnRegistrar" class="btn btn-registrar">REGISTRAR ROSTRO</button>
    <div id="mensajeBackend" class="mensaje-backend-card"></div>
  </div>
</div>

<script src="lib/face/face-api.min.js"></script>
<script src="./js/Fichar/fichar.js"></script>
</body>
</html>
