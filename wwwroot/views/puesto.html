<!-- Contenedor Principal -->
<div class="px-3 py-3">
      <!-- Título -->
  <div class="mb-3">
    <h3 class="titulo-seccion">Listado y Control de Puestos</h3>
    <p class="text-muted  mb-0">Panel para administrar y consultar puestos.</p>
  </div>

  <hr />



  <!-- Contenedor de Botones y Tabla -->
       <!-- Contenedor de Botones y Tabla -->
  <div style="background-color: white; border-radius: 5px; padding: 10px">
     <!-- Fondo Oscuro al Abrir Panel -->
    <div id="fondoOscuro" onclick="CerrarPanelPuesto()"></div>

     <!-- Contenedor de Acciones (Aregar, Filtrar y Generar Informe) -->
    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
      <!-- Botón Agregar -->
      <button class="btn btn-agregar" onclick="AbrirPanelPuesto()">
        <i class="fa-solid fa-square-plus me-1"></i>
        <span>Agregar Puesto</span>
      </button>

      <!-- Botones Filtros y Informe -->
      <div class="d-flex gap-2 flex-wrap responsive-button">
        <button id="btnMostrarFiltros" class="btn btn-filtro" onclick="AbrilPanelFiltros('contenedorFiltros')">
          <i class="fa-solid fa-filter me-1"></i>
          <span>Filtros</span>
        </button>

      </div>
    </div>

        <!-- Contenedor Filtros-->
    <div id="contenedorFiltros" class="filtros-panel mb-3 d-none">
      <div class="row g-3 align-items-end">
        <!-- Por Estado -->
        <div class="col-12 col-md-2">
          <label for="EstadoIdBuscar" class="form-label-fija">Estado</label>
          <select id="EstadoIdBuscar" class="form-control filtro-select">
            <option value="">[Todos]</option>
            <option value="0">Activos</option>
            <option value="1">Inactivos</option>
          </select>
        </div>

        <!-- Por Sector -->
        <div class="col-12 col-md-3">
          <label for="SectorIdBuscar" class="form-label-fija">Sector</label>
          <select id="SectorIdBuscar" class="form-control filtro-select">
            <option value="">[Todos]</option>
            <!-- Aquí se cargarán dinámicamente los sectores -->
          </select>


      </div>
    </div>
    </div>


    <!-- Contenedor Generar-->
    <div id="contenedorGenerar" class="generar-panel mb-3 d-none">
      <div class="d-flex gap-2 flex-wrap">
        <button class="btn btn-generar-pdf" onclick="GenerarPDF()">
          <i class="fa-solid fa-file-pdf me-1"></i> PDF
        </button>
        <button class="btn btn-generar-excel" onclick="GenerarExcel()">
          <i class="fa-solid fa-file-excel me-1"></i> Excel
        </button>
        <button class="btn btn-generar-grafico" onclick="GenerarGrafico()">
          <i class="fa-solid fa-chart-column me-1"></i> Gráfico
        </button>
      </div>
    </div>


  <div id="contenedorGrafico" class="mb-3 mt-3 d-none">
  <canvas id="graficoProvincias" width="400" height="150"></canvas>
</div>

    <!-- Tabla de Datos -->
    <div class="table-responsive">
      <table class="table table-bordered table-hover align-middle w-100" id="tablaPuestos">
        <colgroup>
          <col style="width: 5%" />
          <col style="width: 45%" />
          <col style="width: 45%" />
          <col style="width: 5%" />
        </colgroup>
        <thead class="table-puestos">
          <tr>
            <th class="text-center">Activo</th>
            <th class="text-start">Puesto</th>
            <th class="text-start d-none d-md-table-cell">Sector</th>
            <th class="text-center">Acciones</th>
          </tr>
        </thead>
        <tbody id="tablaPuestosBody"></tbody>
      </table>
    </div>

</div>


    <!-- Panel deslizante -->
   
    <div id="panelPuesto" aria-modal="true" role="dialog" aria-labelledby="panelTitulo" tabindex="-1" class="w-30">
      <div class="panel-header">
        <h2 id="panelTitulo" class="panel-title">Formulario De Puesto</h2>
      </div>
      <div class="panel-body">
        <form id="formPuesto">
          <input type="hidden" id="IdPuesto" />

          <div class="form-grid">
            <div class="form-group">
              <input type="text" id="NombrePuesto" class="form-control" placeholder=" " />
              <label for="NombrePuesto">Nombre</label>
              <div class="invalid-feedback" id="errorNombrePuesto"></div>
            </div>

            <div class="form-group">   
                <select name="IdSector" id="IdSector" class="form-control" required>
                  <option value="" disabled selected hidden>Seleccione un sector</option>
                  
                </select>
                <label for="IdSector">Sector</label>
                <div class="invalid-feedback" id="errorIdSector"></div>
            </div>

          </div>
        </form>
      </div>
      <div class="panel-footer mt-3">
        <button class="btn btn-cancelar" onclick="CerrarPanelPuesto()">Cancelar</button>
        <button  type="submit" class="btn btn-guardar" onclick="BuscarPuestosId()">Guardar</button>
      </div>
    </div>


  


 
</div>

<script src="../js/Vistas/puesto.js"></script>
<script src="../js/Vistas/common/obtenerSector.js"></script>
