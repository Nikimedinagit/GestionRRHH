<div class="px-3 py-3">
  <div id="pantallaCargaGeneral" class="pantalla-carga">
    <div class="contenido-carga card-carga">
      <div class="icono-carga mb-3"><i class="bi bi-buildings"></i></div>
      <h5 class="fw-bold mb-2">Cargando cuentas</h5>
      <div class="spinner-border text-primary spinner-grande my-3" role="status"></div>
      <p class="text-muted mensaje-carga">Estamos preparando las cuentas registradas <span class="dots"></span></p>
    </div>
  </div>

  <div class="bg-white shadow-sm rounded p-2 mb-3 border-start border-primary"
    style="border-left-width:3px !important;">
    <div class="px-2">
      <h4 class="fw-bold text-dark mb-0" style="letter-spacing:-0.5px;font-size:1.2rem;">Administración de Cuentas</h4>
      <p class="text-muted mb-0" style="font-size:0.85rem;opacity:0.8;">
        Habilitá o deshabilitá el acceso de las empresas registradas en el sistema.
      </p>
    </div>
  </div>

  <div class="d-flex justify-content-end align-items-center mb-3">
    <button id="btnMostrarFiltros" class="btn rounded btn-filtro btn-filtro-movil-ancho py-1 px-2 border bg-white"
      onclick="toggleFiltros()">
      <i class="fa-solid fa-arrow-down-wide-short me-1" style="color:#F0AD4E;"></i>
      <span>Filtros</span>
    </button>
  </div>

  <div id="contenedorFiltros" class="filtros-panel mb-3 d-none">
    <div class="row g-3 align-items-end">
      <div class="col-12 col-md-6">
        <label for="buscarCuenta" class="form-label-fija">Cuenta</label>
        <input id="buscarCuenta" class="form-control filtro-select" placeholder="Buscar por empresa, nombre o correo..." />
      </div>
      <div class="col-12 col-md-3">
        <label for="estadoCuentaBuscar" class="form-label-fija">Estado</label>
        <select id="estadoCuentaBuscar" class="form-control filtro-select">
          <option value="">[Todos]</option>
          <option value="PROTEGIDA">PROTEGIDA</option>
          <option value="HABILITADA">HABILITADA</option>
          <option value="DESHABILITADA">DESHABILITADA</option>
        </select>
      </div>
    </div>
  </div>

  <div class="d-flex flex-wrap justify-content-between mb-3" style="gap:1rem;">
    <div class="card p-2 border-0 shadow-sm"
      style="min-width:200px;flex:1 1 calc(33% - 1rem);border-left:3px solid #0d6efd !important;">
      <div class="d-flex align-items-center">
        <div class="p-2 me-3 rounded" style="background:#e7f1ff;"><i class="bi bi-buildings text-primary fs-5"></i></div>
        <div><p class="mb-0 text-muted small fw-bold">Total Cuentas</p><h5 id="totalCuentas" class="mb-0 fw-bold">0</h5></div>
      </div>
    </div>
    <div class="card p-2 border-0 shadow-sm"
      style="min-width:200px;flex:1 1 calc(33% - 1rem);border-left:3px solid #198754 !important;">
      <div class="d-flex align-items-center">
        <div class="p-2 me-3 rounded" style="background:#dff3e7;"><i class="bi bi-check-circle text-success fs-5"></i></div>
        <div><p class="mb-0 text-muted small fw-bold">Habilitadas</p><h5 id="cuentasHabilitadas" class="mb-0 fw-bold">0</h5></div>
      </div>
    </div>
    <div class="card p-2 border-0 shadow-sm"
      style="min-width:200px;flex:1 1 calc(33% - 1rem);border-left:3px solid #dc3545 !important;">
      <div class="d-flex align-items-center">
        <div class="p-2 me-3 rounded" style="background:#f8d7da;"><i class="bi bi-person-x text-danger fs-5"></i></div>
        <div><p class="mb-0 text-muted small fw-bold">Deshabilitadas</p><h5 id="cuentasDeshabilitadas" class="mb-0 fw-bold">0</h5></div>
      </div>
    </div>
  </div>

  <div id="contenedorCuentas" class="row g-3"></div>
</div>
<script src="../js/Vistas/cuentas.js"></script>
