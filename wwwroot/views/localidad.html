<div class="px-3 py-3">


  <!-- ======================================= Título ====================================== -->
  <div class="mb-3">
    <h3 class="titulo-seccion mb-1">Listado y Control de Localidades</h3>
    <p class="text-muted  mb-0">Panel para administrar y consultar localidades.</p>
  </div>

  <hr />


  <!-- ======================================= Contenedor de Botones y Tabla ====================================== -->
  <div style="background-color: white; border-radius: 5px; padding: 10px">

    <div id="fondoOscuro" onclick="CerrarPanelLocalidad()"></div>

    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
      <button class="btn btn-agregar" onclick="AbrirPanelLocalidad()">
        <i class="fa-solid fa-square-plus me-1"></i>
        <span>Agregar Localidad</span>
      </button>

      <div class="d-flex gap-2 flex-wrap responsive-button">
        <button id="btnMostrarFiltros" class="btn btn-filtro" onclick="AbrilPanelFiltros('contenedorFiltros')">
          <i class="fa-solid fa-filter me-1"></i>
          <span>Filtros</span>
        </button>
      </div>
    </div>


    <!-- ======================================= Contenedor Filtros ====================================== -->
    <div id="contenedorFiltros" class="filtros-panel mb-3 d-none">
      <div class="row g-3 align-items-end">

          <div class="col-12 col-md-3">
          <label for="NombreLocalidadBuscar" class="form-label-fija">Nombre</label>
          <input type="text" class="form-control filtro-select" id="NombreLocalidadBuscar" placeholder="Buscar..." />
        </div>

        <div class="col-12 col-md-2">
          <label for="EstadoIdBuscar" class="form-label-fija">Estado</label>
          <select id="EstadoIdBuscar" class="form-control filtro-select">
            <option value="">[Todos]</option>
            <option value="0">Activos</option>
            <option value="1">Inactivos</option>
          </select>
        </div>

        <div class="col-12 col-md-2">
          <label for="ProvinciaIdBuscar" class="form-label-fija">Provincia</label>
          <select id="ProvinciaIdBuscar" class="form-control filtro-select">
            <option value="">[Todas]</option>
          </select>

        </div>
      </div>
    </div>


    <!-- ======================================= Contenedor Generar ====================================== -->
    <div id="contenedorGenerar" class="generar-panel mb-3 d-none">
      <div class="d-flex gap-2 flex-wrap">
        <button class="btn btn-generar-pdf" onclick="GenerarPDF()">
          <i class="fa-solid fa-file-pdf me-1"></i> PDF
        </button>
        <button class="btn btn-generar-excel" onclick="GenerarExcel()">
          <i class="fa-solid fa-file-excel me-1"></i> Excel
        </button>
      </div>
    </div>


    <!-- ======================================= Tabla de Datos ====================================== -->
    <div class="table-responsive">
      <table class="table table-bordered table-hover align-middle w-100" id="tablaLocalidades">
        <colgroup>
          <col style="width: 5%" />
          <col style="width: 45%" />
          <col style="width: 45%" />
          <col style="width: 5%" />
        </colgroup>
        <thead class="table-localidades">
          <tr>
            <th class="text-center">Activo</th>
            <th class="text-start">Localidad</th>
            <th class="text-start d-none d-md-table-cell">Provincia</th>
            <th class="text-center">Acciones</th>
          </tr>
        </thead>
        <tbody id="tablaLocalidadesBody"></tbody>
      </table>
    </div>

  </div>


  <!-- ======================================= Panel Deslizante Formulario de Localidad ====================================== -->
  <div id="panelLocalidad" aria-modal="true" role="dialog" aria-labelledby="panelTitulo" tabindex="-1" class="w-30">
    <div class="panel-header">
      <h2 id="panelTitulo" class="panel-title">Formulario De Localidad</h2>
    </div>
    <div class="panel-body">
      <form id="formLocalidad">
        <input type="hidden" id="IdLocalidad" />

        <div class="form-grid">
          <div class="form-group">
            <input type="text" id="NombreLocalidad" class="form-control" placeholder=" " />
            <label for="NombreLocalidad">Nombre</label>
            <div class="invalid-feedback" id="errorNombreLocalidad"></div>
          </div>

          <div class="form-group">
            <select name="IdProvincia" id="IdProvincia" class="form-control" required>
            </select>
            <label for="IdProvincia">Provincia</label>
            <div class="invalid-feedback" id="errorIdProvincia"></div>

          </div>

        </div>
      </form>
    </div>
    <div class="panel-footer mt-3">
      <button class="btn btn-cancelar" onclick="CerrarPanelLocalidad()">Cancelar</button>
      <button type="submit" class="btn btn-guardar" onclick="BuscarLocalidadId()">Guardar</button>
    </div>
  </div>


</div>

<script src="../js/Vistas/localidad.js"></script>
<script src="../js/Vistas/common/obtenerProvincia.js"></script>
