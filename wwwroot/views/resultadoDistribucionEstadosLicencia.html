<div class="px-3 py-3">


    <!-- ======================================= Título ====================================== -->
    <div class="bg-white shadow-sm rounded p-2 mb-3 border-start border-primary"
        style="border-left-width: 3px !important;">
        <div class="px-2">
            <h4 class="fw-bold text-dark mb-0" style="letter-spacing: -0.5px; font-size: 1.2rem;">Detalle de Licencia
                por Estado</h4>
            <p class="text-muted mb-0" style="font-size: 0.85rem; opacity: 0.8;">
                Consultá la distribución de las licencias según su estado de gestión, con totales, porcentajes y última
                fecha registrada.
            </p>
        </div>
    </div>


    <!-- ======================================= Contenedor de Botones y Graficos ====================================== -->
    <div>

        <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">

            <a href="#resultadoGestionLicencia"
                class="btn rounded btn-volver py-1 px-3 border bg-white shadow-sm d-inline-flex align-items-center justify-content-center text-decoration-none responsive-button">
                <i class="fa-solid fa-arrow-left me-2" style="color: var(--c);"></i>
                <span class="fw-bold" style="color: #495057;">Volver</span>
            </a>

            <button class="btn rounded btn-informe py-1 px-2 border bg-white responsive-button"
                    onclick="GenerarInformePdfDistribucionEstados()">
                    <i class="fa-solid fa-file-export me-1" style="color: #dc3545;"></i>
                    <span>Exportar</span>
                </button>
        </div>



        <!-- ==================================== Tabla de Datos ===================================== -->
        <div class="table-responsive">
            <table class="table table-bordered table-hover align-middle">
                <thead>
                    <tr>
                        <th class="text-start">Estado</th>
                        <th class="text-center">Cantidad</th>
                        <th class="text-center d-none d-sm-table-cell">Porc. Total (%)</th>
                        <th class="text-center d-none d-md-table-cell">Ultima Licencia</th>
                    </tr>
                </thead>
                <tbody id="listadoDistribucionEstadoLicencia"></tbody>
            </table>
        </div>

    </div>


</div>
