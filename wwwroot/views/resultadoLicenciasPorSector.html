<div class="px-3 py-3">


    <!-- ======================================= Título ====================================== -->
    <div class="bg-white shadow-sm rounded p-2 mb-3">
        <h3 class="titulo-seccion mb-1">Detalle de Licencias por Sector y Puesto</h3>
        <p class="text-muted fs-6 mb-0">
            Consultá las licencias gestionadas por sector y puesto, con el detalle de empleados, tipo de licencia, período y estado de cada registro.
        </p>
    </div>



    <!-- ======================================= Contenedor de Botones y Graficos ====================================== -->
    <div>

        <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">

            <a href="#resultadoGestionLicencia" class="btn btn-volver">
                <i class="fa-solid fa-arrow-left me-1"></i>
                <span>Volver</span>
            </a>

            <div class="d-flex gap-2 flex-wrap responsive-buttons">
                <button id="btnMostrarFiltros" class="btn btn-filtro" onclick="AbrilPanelFiltros('contenedorFiltros')">
                    <i class="fa-solid fa-filter me-1"></i>
                    <span>Filtros</span>
                </button>

                <button class="btn btn-informe" onclick="GenerarInformePdfListadoLicenciasPorSector()">
                    <i class="fa-solid fa-file-lines me-1"></i>
                    <span>Generar Informe</span>
                </button>
            </div>
        </div>


        <!--================================ Contenedor Filtros ===================================== -->
        <div id="contenedorFiltros" class="filtros-panel mb-3 d-none">
            <div class="row g-3 align-items-end">

                <div class="col-12 col-md-3">
                    <label for="EmpleadoIdBuscar" class="form-label-fija">Empleado</label>
                    <input type="text" class="form-control filtro-select" id="EmpleadoIdBuscar"
                        placeholder="Buscar..." />
                </div>

                <div class="col-12 col-md-2">
                    <label for="NroLegajoFiltro" class="form-label-fija">Legajo</label>
                    <input type="text" class="form-control filtro-select" id="NroLegajoFiltro"
                        placeholder="Buscar..." />
                </div>

                <div class="col-12 col-md-3">
                    <label for="IdSectorFiltro" class="form-label-fija">Sector</label>
                    <select id="IdSectorFiltro" class="form-control filtro-select">
                        <option value="0">[Todos]</option>
                    </select>
                </div>

                <div class="col-12 col-md-3">
                    <label for="IdPuestoFiltro" class="form-label-fija">Puesto</label>
                    <select id="IdPuestoFiltro" class="form-control filtro-select">
                        <option value="0">[Todos]</option>
                    </select>
                </div>

                <div class="col-12 col-md-2">
                    <label for="EstadoIdBuscar" class="form-label-fija">Estado</label>
                    <select id="EstadoIdBuscar" class="form-control filtro-select">
                        <option value="0">[Todos]</option>
                        <option value="1">PENDIENTES</option>
                        <option value="2">APROBADAS</option>
                        <option value="3">RECHAZADAS</option>
                        <option value="4">EXPIRADAS</option>
                    </select>
                </div>

                <div class=" col-12 col-md-2">
                    <label for="FechaInicioBuscar" class="form-label-fija">Desde</label>
                    <input type="date" class="form-control filtro-select" id="FechaInicioBuscar" />
                </div>

                <div class="col-12 col-md-2">
                    <label for="FechaFinBuscar" class="form-label-fija">Hasta</label>
                    <input type="date" class="form-control filtro-select" id="FechaFinBuscar" />
                </div>

            </div>
        </div>



        <!-- ==================================== Tabla de Datos ===================================== -->
        <div class="table-responsive">
            <table class="table table-bordered table-hover align-middle">
                <thead>
                    <tr>
                        <th class="text-start">Tipo de Licencia</th>
                        <th class="text-center">Estado</th>
                        <th class="text-center d-none d-sm-table-cell">Periodo</th>
                    </tr>
                </thead>
                <tbody id="listadoLicenciasPorSector"></tbody>
            </table>
        </div>

    </div>


</div>

<script src="../js/Vistas/resultados/listadoLicenciasPorSector.js"></script>
