<!-- Contenedor Principal -->
<div class="px-3 py-3">
  <!-- Título -->
  <div class="mb-3">
    <h3 class="titulo-seccion">Seguimiento de Evaluaciones</h3>
    <p class="text-muted mb-0" style="font-size: 0.95rem;">
      Visualizá el progreso, resultados y responsables de las evaluaciones realizadas.
    </p>
  </div>


  <hr />

  <!-- Contenedor de Botones y Tabla -->
  <div style="background-color: white; border-radius: 5px; padding: 10px">
    <!-- Fondo Oscuro al Abrir Panel -->
    <div id="fondoOscuro" onclick="cerrarPanelEvaluaciones()"></div>

    <!-- Contenedor de Acciones (Aregar, Filtrar y Generar Informe) -->
    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
      <!-- Botón Nueva Evaluación -->
      <button class="btn btn-agregar" onclick="abrirPanelEvaluaciones()">
        <i class="fa-solid fa-square-plus me-1"></i>
        <span>Nueva Evaluación</span>
      </button>

      <!-- Botones Filtros y Informe -->
      <div class="d-flex gap-2 flex-wrap">
        <button id="btnMostrarFiltros" class="btn btn-filtro" onclick="AbrilPanelFiltros('contenedorFiltros')">
          <i class="fa-solid fa-filter me-1"></i>
          <span>Filtros</span>
        </button>

        <button id="btnMostrarGenerar" class="btn btn-informe" onclick="AbrilPanelGenerar('contenedorGenerar')">
          <i class="fa-solid fa-file-lines me-1"></i>
          <span>Generar</span>
        </button>
      </div>
    </div>



    <!-- Contenedor Filtros-->
    <div id="contenedorFiltros" class="filtros-panel mb-3 d-none">
      <div class="row g-3 align-items-end">
        <!-- Empleado -->
        <div class="col-12 col-md-3">
          <label for="EmpleadoIdBuscar" class="form-label-fija">Empleado</label>
          <input type="text" class="form-control filtro-select" id="EmpleadoIdBuscar" placeholder="Buscar..." />
        </div>

        <!-- Calificacion -->
        <div class="col-12 col-md-2">
          <label for="CalificacionBuscar" class="form-label-fija">Calificacion</label>
          <select id="CalificacionBuscar" class="form-control filtro-select">
            <option value="0">[Todas]</option>
            <option value="1">REGULAR</option>
            <option value="2">BUENA</option>
            <option value="3">MUY BUENA</option>
            <option value="4">EXCELENTE</option>
          </select>
        </div>


        <!-- Activar Fecha -->
        <div class="col-12 col-md-1">
          <label class="form-label-fija">Fecha</label>
          <select id="filtrarFechaSelect" class="form-control filtro-select">
            <option value="no" selected>No</option>
            <option value="si">Sí</option>
          </select>
        </div>

        <!-- Fecha de Evaluacion -->
        <div id="fechasInputs" class="d-none col-12 col-md-2">
          <label for="FechaEvalBuscar" class="form-label-fija">Fecha de Evaluación</label>
          <input type="date" class="form-control filtro-select" id="FechaEvalBuscar" />
        </div>


      </div>
    </div>


    <!-- Contenedor Generar-->
    <div id="contenedorGenerar" class="generar-panel mb-3 d-none">
      <div class="d-flex gap-2 flex-wrap">
        <button class="btn btn-generar-pdf" onclick="GenerarPDF()">
          <i class="fa-solid fa-file-pdf me-1"></i> PDF
        </button>
        <button class="btn btn-generar-excel" onclick="GenerarExcel()">
          <i class="fa-solid fa-file-excel me-1"></i> Excel
        </button>
        <button class="btn btn-generar-grafico" onclick="GenerarGrafico()">
          <i class="fa-solid fa-chart-column me-1"></i> Gráfico
        </button>
      </div>
    </div>


    <div id="contenedorGrafico" class="mb-3 mt-3 d-none">
      <canvas id="graficoEvalauciones" style="width: 100%; height: auto;"></canvas>
    </div>


    <!-- Contenedor de tarjetas de resumen de evaluaciones -->
    <div>
      <div class="d-flex flex-wrap justify-content-between" style="gap: 1rem;">

        <!-- Total de evaluaciones -->
        <div class="card p-3 border-0" style="background-color: #f3f4f6; min-width: 200px; flex: 1 1 calc(33% - 1rem);">
          <div class="d-flex align-items-center">
            <div class="bg-primary bg-opacity-10 p-3 me-3">
              <i class="fas fa-tasks text-primary fs-4"></i>
            </div>
            <div>
              <p class="mb-0 text-muted small">Total evaluaciones</p>
              <h5 class="mb-0 fw-bold" id="totalEvaluaciones">0</h5>
            </div>
          </div>
        </div>

        <!-- Promedio general -->
        <div class="card p-3 border-0" style="background-color: #f3f4f6; min-width: 200px; flex: 1 1 calc(33% - 1rem);">
          <div class="d-flex align-items-center">
            <div class="bg-info bg-opacity-10 p-3 me-3">
              <i class="fas fa-chart-line text-info fs-4"></i>
            </div>
            <div>
              <p class="mb-0 text-muted small">Promedio general</p>
              <h5 class="mb-0 fw-bold" id="promedioEvaluaciones">0.00</h5>
            </div>
          </div>
        </div>

        <!-- Total empleados evaluados -->
        <div class="card p-3 border-0" style="background-color: #f3f4f6; min-width: 200px; flex: 1 1 calc(33% - 1rem);">
          <div class="d-flex align-items-center">
            <div class="bg-success bg-opacity-10 p-3 me-3">
              <i class="fas fa-users text-success fs-4"></i>
            </div>
            <div>
              <p class="mb-0 text-muted small">Empleados evaluados</p>
              <h5 class="mb-0 fw-bold" id="totalEmpleadosEvaluados">0</h5>
            </div>
          </div>
        </div>

      </div>
    </div>

    <hr style="margin-bottom: 1rem;" />

    <!-- Contenedor de las evaluaciones -->
    <div class="container-fluid">
      <div id="contenedorEvaluaciones" class="row ">
        <!--Se cargarán dinámicamente-->
      </div>
    </div>

    <!-- Panel Deslizante DETALLE -->
    <div id="panelCriterios" aria-modal="true" role="dialog" aria-labelledby="panelTitulo" tabindex="-1" class="w-30">
      <div class="panel-header">
        <h2 id="panelTitulo" class="panel-title">Formulario De Criterios de Evaluación</h2>
      </div>
      <div class="panel-body">
        <form id="formCriterios">
          <input type="hidden" id="IdCriterio" />
          <div class="form-grid">

            <div class="form-group position-relative mb-3">
              <select name="IdTipoCriterio" id="IdTipoCriterio" class="form-control" required>
                <option value="" disabled selected>Seleccione</option>
              </select>
              <label for="IdTipoCriterio">Tipo de Criterio</label>
              <div class="invalid-feedback" id="errorIdTipoCriterio"></div>
            </div>

            <!-- Descripcion -->
            <div class="form-group position-relative mb-3">
              <input type="text" id="Descripcion" class="form-control" placeholder=" " />
              <label for="Descripcion">Descripcion</label>
              <div class="invalid-feedback" id="errorDescripcion"></div>
            </div>
          </div>
        </form>
      </div>
      <div class="panel-footer">
        <button class="btn btn-cancelar" onclick="cerrarPanelCriterios()">
          Cancelar
        </button>
        <button type="submit" class="btn btn-guardar" onclick="BuscarCriterioId()">
          Guardar
        </button>
      </div>
    </div>

    <!-- Panel Deslizante Formulario -->
    <div id="panelEvaluaciones" aria-modal="true" role="dialog" aria-labelledby="panelTitulo" tabindex="-1"
      class="w-30">
      <div class="panel-header">
        <h2 id="panelTitulo" class="panel-title">Formulario De Evaluaciones</h2>
      </div>
      <div class="panel-body">
        <form id="formEvaluaciones">
          <input type="hidden" id="IdEvaluacion" />
          <div class="form-grid">

            <!-- Calificacion -->
            <div class="form-group position-relative mb-3">
              <input type="number" id="CalificacionEvaluacion" class="form-control" placeholder=" " />
              <label for="CalificacionEvaluacion">Calificación</label>
              <div class="invalid-feedback" id="errorCalificacionEvaluacion"></div>
            </div>

            <!-- Empleado -->
            <div class="form-group position-relative mb-3">
              <select name="EmpleadoId" id="EmpleadoId" class="form-control" required>
                <option value="EmpleadoId" disabled selected>Seleccione un empleado</option>
              </select>
              <label for="EmpleadoId">Empleado</label>
              <div class="invalid-feedback" id="errorEmpleadoId"></div>
            </div>


        </form>
      </div>
      <div class="panel-footer">
        <button type="button" class="btn btn-cancelar" onclick="cerrarPanelEvaluaciones()">
          Cancelar
        </button>
        <button type="submit" class="btn btn-guardar" onclick="BuscarEvaluacionId()">
          Guardar
        </button>
      </div>
    </div>


    <script src="../js/Vistas/common/obtenerEmpleado.js"></script>
    <script src="../js/Vistas/common/obtenetTiposDeCriterios.js"></script>
    <script src="../js/Vistas/evaluacion.js"></script>
    <script src="../js/Vistas/estadisticas/estadisticasEvaluaciones.js"></script>




  </div>
