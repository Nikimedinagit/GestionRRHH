<div class="px-3 py-3">


    <!-- ======================================= Título ====================================== -->
    <div class="bg-white shadow-sm rounded p-2 mb-3">
        <h3 class="titulo-seccion mb-1">Detalle de Cursos por Empleado</h3>
        <p class="text-muted fs-6 mb-0">
            Consultá detallada de cursos con sus empleados participantes, mostrando asistencia, resultado
            (Aprobado/Reprobado) y estado de certificación.
        </p>
    </div>

    <!-- ======================================= Contenedor de Botones y Graficos ====================================== -->
    <div>

        <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">

            <a href="#resultadoGestionCurso" class="btn btn-volver">
                <i class="fa-solid fa-arrow-left me-1"></i>
                <span>Volver</span>
            </a>

            <div class="d-flex gap-2 flex-wrap responsive-buttons">
                <button id="btnMostrarFiltros" class="btn btn-filtro" onclick="AbrilPanelFiltros('contenedorFiltros')">
                    <i class="fa-solid fa-filter me-1"></i>
                    <span>Filtros</span>
                </button>

                <button class="btn btn-informe" onclick="GenerarInformePdfCursosPorEmpleado()">
                    <i class="fa-solid fa-file-lines me-1"></i>
                    <span>Generar Informe</span>
                </button>
            </div>
        </div>


        <!--================================ Contenedor Filtros ===================================== -->
        <div id="contenedorFiltros" class="filtros-panel mb-3 d-none">
            <div class="row g-3 align-items-end">

                <div class="col-12 col-md-3">
                    <label for="EmpleadoIdBuscar" class="form-label-fija">Empleado</label>
                    <input type="text" class="form-control filtro-select" id="EmpleadoIdBuscar"
                        placeholder="Buscar..." />
                </div>

                <div class="col-12 col-md-3">
                    <label for="NombreCursoBuscar" class="form-label-fija">Nombre Curso</label>
                    <input type="text" class="form-control filtro-select" id="NombreCursoBuscar"
                        placeholder="Buscar..." />
                </div>

                <div class=" col-12 col-md-2">
                    <label for="ResultadoBuscar" class="form-label-fija">Resultado</label>
                    <select id="ResultadoBuscar" class="form-control filtro-select">
                        <option value="">[Todos]</option>
                        <option value="Aprobado">APROBADO</option>
                        <option value="Reprobado">REPROBADO</option>
                    </select>
                </div>

            </div>
        </div>



        <!-- ==================================== Tabla de Datos ===================================== -->
        <div class="table-responsive">
            <table class="table table-bordered table-hover align-middle">
                <thead>
                    <tr>
                        <th class="text-center">Asistio</th>
                        <th class="text-center">Calificacion</th>
                        <th class="text-center d-none d-sm-table-cell">Certificado</th>
                    </tr>
                </thead>
                <tbody id="listadoCursosPorEmpleado"></tbody>
            </table>
        </div>

    </div>


</div>

<script src="../js/Vistas/resultados/listadoCursosEmpleado.js"></script>
