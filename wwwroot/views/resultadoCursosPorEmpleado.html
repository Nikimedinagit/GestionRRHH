<div class="px-3 py-3">


    <!-- ======================================= Título ====================================== -->
    <div class="bg-white shadow-sm rounded p-2 mb-3 border-start border-primary"
        style="border-left-width: 3px !important;">
        <div class="px-2">
            <h4 class="fw-bold text-dark mb-0" style="letter-spacing: -0.5px; font-size: 1.2rem;">Detalle de Cursos por
                Empleado</h4>
            <p class="text-muted mb-0" style="font-size: 0.85rem; opacity: 0.8;">
                Consultá detallada de cursos con sus empleados participantes, mostrando asistencia, resultado
                (Aprobado/Reprobado) y estado de certificación. </p>
        </div>
    </div>

    <!-- ======================================= Contenedor de Botones y Graficos ====================================== -->
    <div>

        <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">

            <a href="#resultadoGestionCurso"
                class="btn rounded btn-volver py-1 px-3 border bg-white shadow-sm d-inline-flex align-items-center justify-content-center text-decoration-none responsive-button">
                <i class="fa-solid fa-arrow-left me-2" style="color: var(--c);"></i>
                <span class="fw-bold" style="color: #495057;">Volver</span>
            </a>

            <div class="d-flex gap-2 flex-wrap responsive-button">
                <button id="btnMostrarFiltros" class="btn rounded btn-filtro py-1 px-2 border bg-white"
                    onclick="toggleFiltros()">
                    <i class="fa-solid fa-arrow-down-wide-short me-1" style="color: #F0AD4E;"></i>
                    <span class="texto-btn">Filtros</span>
                </button>

                <button class="btn rounded btn-informe py-1 px-2 border bg-white"
                    onclick="GenerarInformePdfCursosPorEmpleado()">
                    <i class="fa-solid fa-file-export me-1" style="color: #dc3545;"></i>
                    <span>Exportar</span>
                </button>
            </div>
        </div>


        <!--================================ Contenedor Filtros ===================================== -->
        <div id="contenedorFiltros" class="filtros-panel mb-3 d-none">
            <div class="row g-3 align-items-end">

                <div class="col-12 col-md-3">
                    <label for="EmpleadoIdBuscar" class="form-label-fija">Empleado</label>
                    <input type="text" class="form-control filtro-select" id="EmpleadoIdBuscar"
                        placeholder="Buscar..." />
                </div>

                <div class="col-12 col-md-3">
                    <label for="NombreCursoBuscar" class="form-label-fija">Nombre Curso</label>
                    <input type="text" class="form-control filtro-select" id="NombreCursoBuscar"
                        placeholder="Buscar..." />
                </div>

                <div class=" col-12 col-md-2">
                    <label for="ResultadoBuscar" class="form-label-fija">Resultado</label>
                    <select id="ResultadoBuscar" class="form-control filtro-select">
                        <option value="">[Todos]</option>
                        <option value="Aprobado">APROBADO</option>
                        <option value="Reprobado">REPROBADO</option>
                    </select>
                </div>

            </div>
        </div>



        <!-- ==================================== Tabla de Datos ===================================== -->
        <div class="table-responsive">
            <table class="table table-bordered table-hover align-middle">
                <thead>
                    <tr>
                        <th class="text-center">Asistio</th>
                        <th class="text-center">Calificacion</th>
                        <th class="text-center d-none d-sm-table-cell">Certificado</th>
                    </tr>
                </thead>
                <tbody id="listadoCursosPorEmpleado"></tbody>
            </table>
        </div>

    </div>


</div>

<script src="../js/Vistas/resultados/listadoCursosEmpleado.js"></script>
