<div class="px-3 py-3">
  <!-- Título -->
  <div class="mb-3">
    <h3 class="titulo-seccion">Administración de Personal</h3>
  </div>

  <hr />

  <!-- Contenedor de Botones y Tabla -->
  <div style="background-color: white; border-radius: 5px; padding: 10px">
    <!-- Fondo Oscuro al Abrir Panel -->
    <div id="fondoOscuro" onclick="CerrarPanelEmpleado()"></div>

    <!-- Contenedor de Acciones (Aregar, Filtrar y Generar Informe) -->
    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
      <!-- Botón Agregar -->
      <button class="btn btn-agregar" onclick="AbrirPanelEmpleado()">
        <i class="fa-solid fa-square-plus me-1"></i>
        <span>Registrar Empleado</span>
      </button>

      <!-- Botones Filtros y Informe -->
      <div class="d-flex gap-2 flex-wrap">
        <button id="btnMostrarFiltros" class="btn btn-filtro" onclick="AbrilPanelFiltros('contenedorFiltros')">
          <i class="fa-solid fa-filter me-1"></i>
          <span>Filtros</span>
        </button>

        <button id="btnMostrarGenerar" class="btn btn-informe" onclick="AbrilPanelGenerar('contenedorGenerar')">
          <i class="fa-solid fa-file-lines me-1"></i>
          <span>Generar</span>
        </button>
      </div>
    </div>






    <!-- Contenedor Filtros-->
    <div id="contenedorFiltros" class="filtros-panel mb-3 d-none">
      <div class="row g-3 align-items-end">
        <div class="col-12 col-md-2">
          <label for="EstadoIdBuscar" class="form-label-fija">Estado</label>
          <select id="EstadoIdBuscar" class="form-control filtro-select">
            <option value="">[Todos]</option>
            <option value="0">Activos</option>
            <option value="1">Inactivos</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Contenedor Generar-->
    <div id="contenedorGenerar" class="generar-panel mb-3 d-none">
      <div class="d-flex gap-2 flex-wrap">
        <button class="btn btn-generar-pdf" onclick="GenerarPDF()">
          <i class="fa-solid fa-file-pdf me-1"></i> PDF
        </button>
        <button class="btn btn-generar-excel" onclick="GenerarExcel()">
          <i class="fa-solid fa-file-excel me-1"></i> Excel
        </button>
        <button class="btn btn-generar-grafico" onclick="GenerarGrafico()">
          <i class="fa-solid fa-chart-column me-1"></i> Gráfico
        </button>
      </div>
    </div>


    <div id="contenedorGrafico" class="mb-3 mt-3 d-none">
      <canvas id="graficoEmpleados" width="400" height="150"></canvas>
    </div>

    <!-- Contenedor de tarjetas de empleados -->
    <div>
      <div class="d-flex flex-wrap justify-content-between" style="gap: 1rem;">

        <!-- Total de empleados -->
        <div class="card p-3 border-0" style="background-color: #f3f4f6; min-width: 180px; flex: 1 1 calc(25% - 1rem);">
          <div class="d-flex align-items-center">
            <div class="bg-primary bg-opacity-10 p-3 me-3">
              <i class="fas fa-users text-primary fs-4"></i>
            </div>
            <div>
              <p class="mb-0 text-muted small">Total de Empleados</p>
              <h5 class="mb-0 fw-bold" id="totalEmpleados">0</h5>
            </div>
          </div>
        </div>

        <!-- Hombres -->
        <div class="card p-3 border-0" style="background-color: #f3f4f6; min-width: 180px; flex: 1 1 calc(25% - 1rem);">
          <div class="d-flex align-items-center">
            <div class="bg-info bg-opacity-10 p-3 me-3">
              <i class="fas fa-male text-info fs-4"></i>
            </div>
            <div>
              <p class="mb-0 text-muted small">Hombres</p>
              <h5 class="mb-0 fw-bold" id="empleadosHombres">0</h5>
            </div>
          </div>
        </div>

        <!-- Mujeres -->
        <div class="card p-3 border-0" style="background-color: #f3f4f6; min-width: 180px; flex: 1 1 calc(25% - 1rem);">
          <div class="d-flex align-items-center">
            <div class="bg-pink bg-opacity-10 p-3 me-3">
              <i class="fas fa-female text-pink fs-4"></i>
            </div>
            <div>
              <p class="mb-0 text-muted small">Mujeres</p>
              <h5 class="mb-0 fw-bold" id="empleadosMujeres">0</h5>
            </div>
          </div>
        </div>

        <!-- Otros -->
        <div class="card p-3 border-0" style="background-color: #f3f4f6; min-width: 180px; flex: 1 1 calc(25% - 1rem);">
          <div class="d-flex align-items-center">
            <div class="bg-secondary bg-opacity-10 p-3 me-3">
              <i class="fas fa-user text-secondary fs-4"></i>
            </div>
            <div>
              <p class="mb-0 text-muted small">Otros / No especificado</p>
              <h5 class="mb-0 fw-bold" id="empleadosOtros">0</h5>
            </div>
          </div>
        </div>

      </div>
    </div>


  </div>

 <!-- Panel Deslizante Formulario de Empleado -->
<div id="panelEmpleado" aria-modal="true" role="dialog" aria-labelledby="panelTituloEmpleado" tabindex="-1" class="w-30">
  <div class="panel-header">
    <h2 id="panelTituloEmpleado" class="panel-title">Formulario de Empleado</h2>
  </div>

  <div class="panel-body">
    <form id="formEmpleado">
      <input type="hidden" id="IdEmpleado" />

      <div class="form-grid" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;">

        <!-- Nombre -->
        <div class="form-group position-relative mb-3">
          <input type="text" id="NombreEmpleado" class="form-control" placeholder=" " />
          <label for="NombreEmpleado">Nombre</label>
          <div class="invalid-feedback" id="errorNombreEmpleado"></div>
        </div>

        <!-- DNI -->
        <div class="form-group position-relative mb-3">
          <input type="number" id="DniEmpleado" class="form-control" placeholder=" " />
          <label for="DniEmpleado">DNI</label>
          <div class="invalid-feedback" id="errorDniEmpleado"></div>
        </div>

        <!-- CUIL -->
        <div class="form-group position-relative mb-3">
          <input type="number" id="CuilEmpleado" class="form-control" placeholder=" " />
          <label for="CuilEmpleado">CUIL</label>
        </div>

        <!-- Teléfono -->
        <div class="form-group position-relative mb-3">
          <input type="number" id="TelefonoEmpleado" class="form-control" placeholder=" " />
          <label for="TelefonoEmpleado">Teléfono</label>
          <div class="invalid-feedback" id="errorTelefonoEmpleado"></div>
        </div>

        <!-- Email -->
        <div class="form-group position-relative mb-3">
          <input type="email" id="EmailEmpleado" class="form-control" placeholder=" " />
          <label for="EmailEmpleado">Email</label>
        </div>

        <!-- Fecha Nacimiento -->
        <div class="form-group position-relative mb-3">
          <input type="date" id="FechaNacimientoEmpleado" class="form-control" placeholder=" " />
          <label for="FechaNacimientoEmpleado">Fecha Nacimiento</label>
          <div class="invalid-feedback" id="errorFechaNacimientoEmpleado"></div>
        </div>

        <!-- Dirección -->
        <div class="form-group position-relative mb-3">
          <input type="text" id="DireccionEmpleado" class="form-control" placeholder=" " />
          <label for="DireccionEmpleado">Dirección</label>
          <div class="invalid-feedback" id="errorDireccionEmpleado"></div>
        </div>

        <!-- Estado Civil -->
        <div class="form-group position-relative mb-3">
          <select id="EstadoCivilEmpleado" class="form-control" required>
            <option value="" disabled selected hidden>Seleccionar estado</option>
            <option value="SOLTERO">SOLTERO</option>
            <option value="CASADO">CASADO</option>
            <option value="DIVORCIADO">DIVORCIADO</option>
            <option value="VIUDO">VIUDO</option>
          </select>
          <label for="EstadoCivilEmpleado">Estado Civil</label>
        </div>

        <!-- Hijos -->
        <div class="form-group position-relative mb-3">
          <input type="number" id="CantidadHijosEmpleado" class="form-control" placeholder=" " />
          <label for="CantidadHijosEmpleado">Cantidad Hijos</label>
        </div>

        <!-- Sexo -->
        <div class="form-group position-relative mb-3">
          <select id="TipoSexoEmpleado" class="form-control" required>
            <option value="" disabled selected hidden>Seleccionar sexo</option>
            <option value="MASCULINO">MASCULINO</option>
            <option value="FEMENINO">FEMENINO</option>
            <option value="NO_BINARIO">NO BINARIO</option>
            <option value="OTRO">OTRO</option>
          </select>
          <label for="TipoSexoEmpleado">Tipo de Sexo</label>
          <div class="invalid-feedback" id="errorTipoSexoEmpleado"></div>
        </div>

        <!-- Localidad -->
        <div class="form-group position-relative mb-3">
          <select id="IdLocalidad" class="form-control" required>
            <option value="" disabled selected hidden>Seleccionar localidad</option>
            <!-- opciones dinámicas -->
          </select>
          <label for="IdLocalidad">Localidad</label>
          <div class="invalid-feedback" id="errorIdLocalidad"></div>
        </div>

        <!-- Puesto -->
        <div class="form-group position-relative mb-3">
          <select id="IdPuesto" class="form-control" required>
            <option value="" disabled selected hidden>Seleccionar puesto</option>
            <!-- opciones dinámicas -->
          </select>
          <label for="IdPuesto">Puesto</label>
          <div class="invalid-feedback" id="errorIdPuesto"></div>
        </div>

      </div>
    </form>
  </div>

  <div class="panel-footer">
    <button class="btn btn-cancelar" onclick="CerrarPanelEmpleado()">Cancelar</button>
    <button type="submit" class="btn btn-guardar" onclick="BuscarEmpleadoId()">Guardar</button>
  </div>
</div>
