
  <div >
    <!-- Titulo de la página -->
    <h1>Listado De Empleados</h1>

    <hr />

    <!-- Botón para abrir el modal -->
    <button class="btn btn-agregar" onclick="AbrirPanelEmpleado()">➕ Agregar Empleados</button>

    <!-- Fondo oscuro -->
    <div id="fondoOscuro" onclick="CerrarPanelEmpleado()"></div>


    <!-- Panel deslizante -->
   
    <div id="panelEmpleado" aria-modal="true" role="dialog" aria-labelledby="panelTitulo" tabindex="-1" class="w-30">
      <div class="panel-header">
        <h2 id="panelTitulo" class="panel-title">Formulario De Empleado</h2>
      </div>
      <div class="panel-body">
       <form id="formEmpleado">
        <input type="hidden" id="IdEmpleado" />

        <div class="container">
          <div class="row">

            <!-- Nombre -->
            <div class="col-md-4 mb-3">
              <div class="form-group">
                <input type="text" id="NombreEmpleado" class="form-control" placeholder=" " />
                <label for="NombreEmpleado">Nombre</label>
                <div class="invalid-feedback" id="errorNombreEmpleado"></div>
              </div>
            </div>

            <!-- DNI -->
            <div class="col-md-4 mb-3">
              <div class="form-group">
                <input type="number" id="DniEmpleado" class="form-control" placeholder=" " />
                <label for="DniEmpleado">DNI</label>
                <div class="invalid-feedback" id="errorDniEmpleado"></div>
              </div>
            </div>

            <!-- CUIL -->
            <div class="col-md-4 mb-3">
              <div class="form-group">
                <input type="number" id="CuilEmpleado" class="form-control" placeholder=" " />
                <label for="CuilEmpleado">CUIL</label>
              </div>
            </div>

            <!-- Teléfono -->
            <div class="col-md-4 mb-3">
              <div class="form-group">
                <input type="number" id="TelefonoEmpleado" class="form-control" placeholder=" " />
                <label for="TelefonoEmpleado">Teléfono</label>
                <div class="invalid-feedback" id="errorTelefonoEmpleado"></div>
              </div>
            </div>

            <!-- Email -->
            <div class="col-md-4 mb-3">
              <div class="form-group">
                <input type="email" id="EmailEmpleado" class="form-control" placeholder=" " />
                <label for="EmailEmpleado">Email</label>
              </div>
            </div>

            <!-- Fecha Nacimiento -->
            <div class="col-md-4 mb-3">
              <div class="form-group">
                <input type="date" id="FechaNacimientoEmpleado" class="form-control" placeholder=" " />
                <label for="FechaNacimientoEmpleado">Fecha Nacimiento</label>
                <div class="invalid-feedback" id="errorFechaNacimientoEmpleado"></div>
              </div>
            </div>

            <!-- Dirección -->
            <div class="col-md-4 mb-3">
              <div class="form-group">
                <input type="text" id="DireccionEmpleado" class="form-control" placeholder=" " />
                <label for="DireccionEmpleado">Dirección</label>
                <div class="invalid-feedback" id="errorDireccionEmpleado"></div>
              </div>
            </div>

            <!-- Estado Civil -->
            <div class="col-md-4 mb-3">
              <div class="form-group">
                <select name="EstadoCivilEmpleado" id="EstadoCivilEmpleado" class="form-control" required>
                  <option value="" disabled selected hidden>Seleccionar estado</option>
                  <option value="SOLTERO">SOLTERO</option>
                  <option value="CASADO">CASADO</option>
                  <option value="DIVORCIADO">DIVORCIADO</option>
                  <option value="VIUDO">VIUDO</option>
                </select>
                <label for="EstadoCivilEmpleado">Estado Civil</label>
              </div>
            </div>

            <!-- Cantidad Hijos -->
            <div class="col-md-4 mb-3">
              <div class="form-group">
                <input type="number" id="CantidadHijosEmpleado" class="form-control" placeholder=" " />
                <label for="CantidadHijosEmpleado">Cantidad Hijos</label>
              </div>
            </div>

            <!-- Tipo Sexo -->
            <div class="col-md-4 mb-3">
              <div class="form-group">
                <select name="TipoSexoEmpleado" id="TipoSexoEmpleado" class="form-control" required>
                  <option value="" disabled selected hidden>Seleccionar sexo</option>
                  <option value="MASCULINO">MASCULINO</option>
                  <option value="FEMENINO">FEMENINO</option>
                  <option value="NO_BINARIO">NO BINARIO</option>
                  <option value="OTRO">OTRO</option>
                </select>
                <label for="TipoSexoEmpleado">Tipo de Sexo</label>
                <div class="invalid-feedback" id="errorTipoSexoEmpleado"></div>
              </div>
            </div>

            <!-- Localidad -->
            <div class="col-md-4 mb-3">
              <div class="form-group">
                <select name="IdLocalidad" id="IdLocalidad" class="form-control" required>
                  <option value="" disabled selected hidden>Seleccionar localidad</option>
                  <!-- Localidades dinámicas -->
                </select>
                <label for="IdLocalidad">Localidad</label>
                <div class="invalid-feedback" id="errorIdLocalidad"></div>
              </div>
            </div>

            <!-- Puesto -->
            <div class="col-md-4 mb-3">
              <div class="form-group">
                <select name="IdPuesto" id="IdPuesto" class="form-control" required>
                  <option value="" disabled selected hidden>Seleccionar puesto</option>
                  <!-- Puestos dinámicos -->
                </select>
                <label for="IdPuesto">Puesto</label>
                <div class="invalid-feedback" id="errorIdPuesto"></div>
              </div>
            </div>

          </div>
        </div>
      </form>

      </div>
      <div class="panel-footer">
        <button class="btn btn-cancelar" onclick="CerrarPanelEmpleado()">Cancelar</button>
        <button  type="submit" class="btn btn-guardar" onclick="BuscarEmpleadoId()">Guardar</button>
      </div>
    </div>


  </div>

<!-- Envolvemos la tabla con esta clase para scroll horizontal responsivo -->
<div class="table-responsive" aria-label="Tabla de Empleados">
  <table class="table table-striped table-hover tabla-empleados">
    <thead class="table-primary">
      <tr>
        <th>Nombre</th>
        <th>DNI</th>
        <th>Puesto</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody id="tablaEmpleadosBody">
      <!-- Filas dinámicas acá -->
    </tbody>
  </table>
</div>



<!-- Modal para Ver Más Detalles del Empleado-->

<div id="overlay" class="overlay"></div>

<div id="modalDetallesEmpleado" class="modal-right-panel">

<div class="header-panel">
  <h5 class="titulo-header">
    <i class="bx bx-id-card"></i> Detalles del Empleado
  </h5>
</div>


  <div class="body-panel px-3 py-3 text-secondary overflow-auto flex-grow-1 text-start">
    <div class="container">
      <div class=" gy-3">

        <div class="col-12 d-flex justify-content-between mt-2 border-bottom"><strong>Nombre:</strong> <span id="detalleNombre"></span></div>
        <div class="col-12 d-flex justify-content-between mt-2 border-bottom"><strong>DNI:</strong> <span id="detalleDni"></span></div>
        <div class="col-12 d-flex justify-content-between mt-2 border-bottom"><strong>CUIL:</strong> <span id="detalleCuil"></span></div>
        <div class="col-12 d-flex justify-content-between mt-2 border-bottom"><strong>Teléfono:</strong> <span id="detalleTelefono"></span></div>
        <div class="col-12 d-flex justify-content-between mt-2 border-bottom"><strong>Email:</strong> <span id="detalleEmail"></span></div>
        <div class="col-12 d-flex justify-content-between mt-2 border-bottom"><strong>Fecha de Nacimiento:</strong> <span id="detalleFechaNacimiento"></span></div>
        <div class="col-12 d-flex justify-content-between mt-2 border-bottom"><strong>Dirección:</strong> <span id="detalleDireccion"></span></div>
        <div class="col-12 d-flex justify-content-between mt-2 border-bottom"><strong>Estado Civil:</strong> <span id="detalleEstadoCivil"></span></div>
        <div class="col-12 d-flex justify-content-between mt-2 border-bottom"><strong>Hijos:</strong> <span id="detalleCantidadHijos"></span></div>
        <div class="col-12 d-flex justify-content-between mt-2 border-bottom"><strong>Sexo:</strong> <span id="detalleSexo"></span></div>
        <div class="col-12 d-flex justify-content-between mt-2 border-bottom"><strong>Localidad:</strong> <span id="detalleLocalidad"></span></div>        
        <div class="col-12 d-flex justify-content-between mt-2 border-bottom"><strong>Puesto:</strong> <span id="detallePuesto"></span></div>
        
      </div>
    </div>
  </div>

  <div class="footer-panel px-3 py-2">
  <button class="cerrar-btn" onclick="cerrarModalDetalles()">Cerrar</button>
    </div>
</div>








</div>

<script src="../js/Vistas/empleado.js"></script>
<script src="../js/Vistas/common/obtenerLocalidad.js"></script>
<script src="../js/Vistas/common/obtenerPuesto.js"></script>
