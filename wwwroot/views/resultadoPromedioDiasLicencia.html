<div class="px-3 py-3">


    <!-- ======================================= Título ====================================== -->
    <div class="mb-3">
        <h3 class="titulo-seccion">Listado de Promedio de Días de Licencia por Sector/Puesto</h3>
        <p class="text-muted mb-3">
            Visualizá el promedio de días de licencia agrupados por sector y puesto, incluyendo cantidad de licencias,
            máximos y mínimos registrados.
        </p>
    </div>



    <hr />

    <!-- ======================================= Contenedor de Botones y Graficos ====================================== -->
    <div style="background-color: white; border-radius: 5px; padding: 10px">

        <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">

            <a href="#resultadoGestionLicencia" class="btn btn-volver">
                <i class="fa-solid fa-arrow-left me-1"></i>
                <span>Volver</span>
            </a>

            <div class="d-flex gap-2 flex-wrap responsive-buttons">
                <button id="btnMostrarFiltros" class="btn btn-filtro" onclick="AbrilPanelFiltros('contenedorFiltros')">
                    <i class="fa-solid fa-filter me-1"></i>
                    <span>Filtros</span>
                </button>

                <button class="btn btn-informe" onclick="GenerarInformePdfPromedioDiasLicencia()">
                    <i class="fa-solid fa-file-lines me-1"></i>
                    <span>Generar Informe</span>
                </button>
            </div>
        </div>


        <!--================================ Contenedor Filtros ===================================== -->
        <div id="contenedorFiltros" class="filtros-panel mb-3 d-none">
            <div class="row g-3 align-items-end">

                <div class="col-12 col-md-3">
                    <label for="IdPuestoFiltro" class="form-label-fija">Puesto</label>
                    <select id="IdPuestoFiltro" class="form-control filtro-select">
                        <option value="0">[Todos]</option>
                    </select>
                </div>

            </div>
        </div>



        <!-- ==================================== Tabla de Datos ===================================== -->
        <div class="table-responsive">
            <table class="table table-bordered table-hover align-middle">
                <thead>
                    <tr>
                        <th class="text-start">Cantidad</th>
                        <th class="text-center">Porc. Dias (%)</th>
                        <th class="text-center d-none d-sm-table-cell">Max. Dias</th>
                        <th class="text-center d-none d-md-table-cell">Min. Dias</th>
                    </tr>
                </thead>
                <tbody id="listadoPromedioDiasLicencia"></tbody>
            </table>
        </div>

    </div>


</div>

<script src="../js/Vistas/resultados/estadisticoPromedioDiasLicencia.js"></script>
