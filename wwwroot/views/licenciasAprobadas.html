<!-- Contenedor Principal -->
<div class="px-3 py-3">
  <!-- Título -->
  <div class="mb-3">
    <h3 class="titulo-seccion">Historial de Licencias Aprobadas</h3>
    <p class="text-muted mb-3">Panel para administrar y consultar licencias aprobadas por empleado.</p>
  </div>

  <hr />

  <!-- Contenedor de Botones y Tabla -->
  <div style="background-color: white; border-radius: 5px; padding: 10px">

    <!-- Contenedor de Acciones (Aregar, Filtrar y Generar Informe) -->
    <div class="d-flex justify-content-end align-items-center mb-3 flex-wrap gap-2">

      <!-- Botones Filtros y Informe -->
      <div class="d-flex gap-2 flex-wrap">
        <button id="btnMostrarFiltros" class="btn btn-filtro" onclick="AbrilPanelFiltros('contenedorFiltros')">
          <i class="fa-solid fa-filter me-1"></i>
          <span>Filtros</span>
        </button>

        <button id="btnMostrarGenerar" class="btn btn-informe" onclick="AbrilPanelGenerar('contenedorGenerar')">
          <i class="fa-solid fa-file-lines me-1"></i>
          <span>Generar</span>
        </button>
      </div>
    </div>



    <!-- Contenedor Filtros-->
    <div id="contenedorFiltros" class="filtros-panel mb-3 d-none">
      <div class="row g-3 align-items-end">
        <!-- Tipo de Licencia -->
        <div class="col-12 col-md-2">
          <label for="TipoDeLicenciaIdBuscar" class="form-label-fija">Tipo de Licencia</label>
          <select id="TipoDeLicenciaIdBuscar" class="form-control filtro-select">
            <option value="0">[Todas]</option>
            <!-- Aquí se cargarán dinámicamente los tipos de licencias -->
          </select>
        </div>

        <!-- Activar Fecha -->
        <div class="col-12 col-md-1">
          <label class="form-label-fija">Fecha</label>
          <select id="filtrarFechaSelect" class="form-control filtro-select">
            <option value="no" selected>No</option>
            <option value="si">Sí</option>
          </select>
        </div>

        <div class="col-12 col-md-2" id="fechasInputs" style="display: none;">
          <label for="FechaAprobacionBuscar" class="form-label-fija">Fecha de Aprobación</label>
          <input type="date" id="FechaAprobacionBuscar" class="form-control filtro-select" />
        </div>

      </div>
    </div>

    <!-- Contenedor Generar-->
    <div id="contenedorGenerar" class="generar-panel mb-3 d-none">
      <div class="d-flex gap-2 flex-wrap">
        <button class="btn btn-generar-pdf" onclick="GenerarPDF()">
          <i class="fa-solid fa-file-pdf me-1"></i> PDF
        </button>
        <button class="btn btn-generar-excel" onclick="GenerarExcel()">
          <i class="fa-solid fa-file-excel me-1"></i> Excel
        </button>
        <button class="btn btn-generar-grafico" onclick="GenerarGrafico()">
          <i class="fa-solid fa-chart-column me-1"></i> Gráfico
        </button>
      </div>
    </div>


    <div id="contenedorGrafico" class="mb-3 mt-3 d-none">
      <canvas id="graficoCriterios" width="400" height="150"></canvas>
    </div>


    <!-- Tabla de Datos -->
    <div class="table-responsive">
      <table class="table table-bordered table-hover align-middle">
        <colgroup>
          <col style="width: 20%" />
          <col style="width: 25%" />
          <col style="width: 25%" />
          <col style="width: 30%" />
        </colgroup>
        <thead class="table-licencias-aprobadas">
          <tr>
            <th class="text-center">Fecha Aprobacion</th>
            <th class="text-center">Estado</th>
            <th class="text-center">Licencia</th>
            <th class="text-center">Responsable</th>
          </tr>
        </thead>
        <tbody id="tablaLicenciasAprobadasBody"></tbody>
      </table>
    </div>
  </div>



  <script src="../js/Vistas/lienciasAprobadas.js"></script>



</div>
