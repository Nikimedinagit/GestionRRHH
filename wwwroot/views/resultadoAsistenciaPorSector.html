<div class="px-3 py-3">


    <!-- ======================================= Título ====================================== -->
    <div class="mb-3">
        <h3 class="titulo-seccion">Listado de Asistencia por Sector y Empleado</h3>
        <p class="text-muted mb-3">Visualizar el estado de asistencia agrupado por sector y por empleado.</p>
    </div>


    <hr />

    <!-- ======================================= Contenedor de Botones y Graficos ====================================== -->
    <div style="background-color: white; border-radius: 5px; padding: 10px">

        <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">

            <a href="#resultadoGestionPersonal" class="btn btn-volver">
                <i class="fa-solid fa-arrow-left me-1"></i>
                <span>Volver</span>
            </a>

            <div class="d-flex gap-2 flex-wrap responsive-buttons">
                <button id="btnMostrarFiltros" class="btn btn-filtro" onclick="AbrilPanelFiltros('contenedorFiltros')">
                    <i class="fa-solid fa-filter me-1"></i>
                    <span>Filtros</span>
                </button>

                <button class="btn btn-informe" onclick="GenerarInformePdfListadoAsistenciaEmpeladoSector()">
                    <i class="fa-solid fa-file-lines me-1"></i>
                    <span>Generar Informe</span>
                </button>
            </div>
        </div>


        <!--================================ Contenedor Filtros ===================================== -->
        <div id="contenedorFiltros" class="filtros-panel mb-3 d-none">
            <div class="row g-3 align-items-end">

                <div class="col-12 col-md-3">
                    <label for="EmpleadoIdBuscar" class="form-label-fija">Empleado</label>
                    <input type="text" class="form-control filtro-select" id="EmpleadoIdBuscar"
                        placeholder="Buscar..." />
                </div>

                <div class="col-12 col-md-2">
                    <label for="NroLegajoFiltro" class="form-label-fija">Legajo</label>
                    <input type="text" class="form-control filtro-select" id="NroLegajoFiltro"
                        placeholder="Buscar..." />
                </div>

                <div class="col-12 col-md-3">
                    <label for="IdSectorFiltro" class="form-label-fija">Sector</label>
                    <select id="IdSectorFiltro" class="form-control filtro-select">
                        <option value="0">[Todos]</option>
                    </select>
                </div>

            </div>
        </div>



        <!-- ==================================== Tabla de Datos ===================================== -->
        <div class="table-responsive">
            <table class="table table-bordered table-hover align-middle">
                <thead>
                    <tr>
                        <th>Empleado</th>
                        <th class="d-none d-sm-table-cell text-center">Presente</th>
                        <th class="d-none d-sm-table-cell text-center">Ausente</th>
                        <th class="d-none d-lg-table-cell text-center">Incompleto</th>
                        <th class="d-none d-lg-table-cell text-center">Tarde</th>
                        <th class="d-none d-lg-table-cell text-center">Fuera de horario</th>
                    </tr>
                </thead>
                <tbody id="listadoAsistenciaPorSector"></tbody>
            </table>
        </div>

    </div>


</div>

<script src="../js/Vistas/resultados/estadisticoAsistenciaPorSector.js"></script>
