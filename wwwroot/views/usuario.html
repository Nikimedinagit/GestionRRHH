<div class="px-3 py-3">

  
  <!-- Título -->
  <div class="mb-3">
    <h3 class="titulo-seccion">Estado del Empleados</h3>
    <p class="text-muted mb-3">Panel para gestionar la activación y roles de los empleados.</p>
  </div>

  <hr />

  <!-- Contenedor de Botones y Tabla -->
  <div style="background-color: white; border-radius: 5px; padding: 10px">

    <!-- Contenedor de Acciones (Filtros y Generar Informe) -->
    <div class="d-flex justify-content-end align-items-center mb-3 flex-wrap gap-2">

      <!-- Botones Filtros y Informe -->
      <div class="d-flex gap-2 flex-wrap responsive-button">
        <button id="btnMostrarFiltros" class="btn btn-filtro" onclick="AbrilPanelFiltros('contenedorFiltros')">
          <i class="fa-solid fa-filter me-1"></i>
          <span>Filtros</span>
        </button>
      </div>
    </div>

    <!-- Contenedor Filtros-->
    <div id="contenedorFiltros" class="filtros-panel mb-3 d-none">
      <div class="row g-3 align-items-end">

         <!-- Buscar por Nombre -->
        <div class="col-12 col-md-3">
          <label for="FiltroNombre" class="form-label-fija">Empleado</label>
          <input type="text" id="FiltroNombre" class="form-control filtro-select" placeholder="Buscar..." />
        </div>

        <!-- Buscar por Email -->
        <div class="col-12 col-md-3">
          <label for="FiltroEmail" class="form-label-fija">Email</label>
          <input type="email" id="FiltroEmail" class="form-control filtro-select" placeholder="Buscar..." />
        </div>

        <!-- Buscar por DNI -->
        <div class="col-12 col-md-2">
          <label for="FiltroDNI" class="form-label-fija">DNI</label>
          <input type="text" id="FiltroDNI" class="form-control filtro-select" placeholder="Buscar..." />
        </div>

        <!-- Buscar por Activo -->
        <div class="col-12 col-md-2">
          <label for="FiltroActivo" class="form-label-fija">Estado de Activación</label>
          <select id="FiltroActivo" class="form-control filtro-select">
            <option value="">[Todos]</option>
            <option value="1">Activo</option>
            <option value="0">Inactivo</option>
          </select>
        </div>

       

      </div>
    </div>


    <!-- Tabla de Datos -->
    <div class="table-responsive">
      <table class="table table-bordered table-hover align-middle w-100">
        <thead class="table-activacion-empleados">
          <tr>
            <th class="text-center columna-fecha-activacion">Fecha Alta</th>
            <th class="text-start ">Nombre Completo</th>
            <th class="text-start columna-email-activacion">Email</th>
            <th class="text-center columna-dni-activacion">DNI</th>
            <th class="text-center columna-estado-activacion" style="width: 5%;">Estado</th>
          </tr>
        </thead>
        <tbody id="tablaActivacionEmpleadosBody"></tbody>
      </table>
    </div>

  </div>


<div class="offcanvas offcanvas-end" tabindex="-1" id="offcanvasDetalleEmpleadoActivacion"
  aria-labelledby="tituloEmpleadoActivacion"
  style="width: 360px; border-top-left-radius: 0; border-bottom-left-radius: 0;">
  
  <div class="detalle-activacion-contenedor">
    <!-- Encabezado -->
    <div class="detalle-activacion-encabezado d-flex justify-content-between align-items-start">
      <div>
        <h5 class="mb-0" style="font-size: 1rem; font-weight: 700; color: #212529;">
          Detalle del Empleado
        </h5>
        <p class="mb-0 text-muted" style="font-size: 0.85rem;">
          Información detallada del estado de activación del empleado.
        </p>
      </div>
      <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Cerrar"></button>
    </div>

    <hr style="margin: 0; border-top: 1px solid #dee2e6" />

    <!-- Cuerpo -->
    <div class="offcanvas-body p-2"
      style="font-size: 0.75rem; line-height: 1.1; max-height: calc(100vh - 70px); overflow-y: auto;">

      <!-- Datos del Cambio -->
      <div class="detalle-activacion-tarjeta">
        <div class="detalle-activacion-seccion">
          <p class="detalle-activacion-titulo-seccion">Datos de Activación</p>

          <div class="detalle-activacion-fila">
            <span class="detalle-activacion-etiqueta">Fecha Activación:</span>
            <span class="detalle-activacion-valor" id="detalleEmpleadoFecha"></span>
          </div>
          <div class="detalle-activacion-fila">
            <span class="detalle-activacion-etiqueta">Estado:</span>
            <span class="detalle-activacion-valor" id="detalleEmpleadoEstado"></span>
          </div>
        </div>
      </div>

      <!-- Datos del Empleado -->
      <div class="detalle-activacion-tarjeta" style="margin-bottom: 1rem;">
        <div class="detalle-activacion-seccion">
          <p class="detalle-activacion-titulo-seccion">Datos Personales</p>

          <div class="detalle-activacion-fila">
            <span class="detalle-activacion-etiqueta">Nombre:</span>
            <span class="detalle-activacion-valor" id="detalleEmpleadoNombre"></span>
          </div>
          <div class="detalle-activacion-fila">
            <span class="detalle-activacion-etiqueta">Email:</span>
            <span class="detalle-activacion-valor" id="detalleEmpleadoEmail"></span>
          </div>
          <div class="detalle-activacion-fila">
            <span class="detalle-activacion-etiqueta">DNI:</span>
            <span class="detalle-activacion-valor" id="detalleEmpleadoDNI"></span>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>



  <script src="../js/Vistas/activacionEmpleado.js"></script>

</div>
