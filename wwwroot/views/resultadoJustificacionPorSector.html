<div class="px-3 py-3">


    <!-- ======================================= Título ====================================== -->
    <div class="bg-white shadow-sm rounded p-2 mb-3">
        <h3 class="titulo-seccion mb-0">Detalle de Justificaciones por Sector y Empleado</h3>
        <p class="text-muted fs-6 mb-0">Consultá el detalle de las justificaciones del personal, agrupadas por sector y empleado.</p>
    </div>


    <!-- ======================================= Contenedor de Botones y Graficos ====================================== -->
    <div>

        <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">

            <a href="#resultadoGestionPersonal" class="btn btn-volver">
                <i class="fa-solid fa-arrow-left me-1"></i>
                <span>Volver</span>
            </a>


            <div class="d-flex gap-2 flex-wrap responsive-buttons">
                <button id="btnMostrarFiltros" class="btn btn-filtro" onclick="AbrilPanelFiltros('contenedorFiltros')">
                    <i class="fa-solid fa-filter me-1"></i>
                    <span>Filtros</span>
                </button>

                <button class="btn btn-informe" onclick="GenerarInformePdfListadoJustificacionPorSector()">
                    <i class="fa-solid fa-file-lines me-1"></i>
                    <span>Generar Informe</span>
                </button>
            </div>
        </div>


        <!--================================ Contenedor Filtros ===================================== -->
        <div id="contenedorFiltros" class="filtros-panel mb-3 d-none">
            <div class="row g-3 align-items-end">

                <div class="col-12 col-md-3" id="filtroEstado">
                    <label for="EstadoJustificacionBuscar" class="form-label-fija">Estado</label>
                    <select id="EstadoJustificacionBuscar" class="form-control filtro-select">
                        <option value="0">[Todos]</option>
                        <option value="1">PENDIENTE</option>
                        <option value="2">ABROBADA</option>
                        <option value="3">RECHAZADA</option>
                    </select>
                </div>

                <div class=" col-12 col-md-2">
                    <label for="FechaInicioBuscar" class="form-label-fija">Desde</label>
                    <input type="date" class="form-control filtro-select" id="FechaInicioBuscar" />
                </div>

                <div class="col-12 col-md-2">
                    <label for="FechaFinBuscar" class="form-label-fija">Hasta</label>
                    <input type="date" class="form-control filtro-select" id="FechaFinBuscar" />
                </div>


            </div>
        </div>



        <!-- ==================================== Tabla de Datos ===================================== -->
        <div class="table-responsive">
            <table class="table table-bordered table-hover align-middle">
                <thead>
                    <tr>
                        <th class="text-center">Fecha</th>
                        <th class="text-start d-none d-md-table-cell">Motivo</th>
                        <th class="text-center">Estado</th>
                    </tr>
                </thead>
                <tbody id="listadoJustificacionesPorSector"></tbody>
            </table>
        </div>



    </div>


</div>

<script src="../js/Vistas/resultados/listadoJustificacionesPorSector.js"></script>
