<div class="px-3 py-3">


    <!-- ======================================= Título ====================================== -->
    <div class="bg-white shadow-sm rounded p-2 mb-3">
        <h3 class="titulo-seccion mb-1">Listado de Historial Laboral por Empleado</h3>
        <p class="text-muted fs-6 mb-0">Visualizá los cambios de puestos y sectores de cada empleado.</p>
    </div>

    <hr />

    <!-- ======================================= Contenedor de Botones y Graficos ====================================== -->
    <div>

        <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">

            <a href="#resultadoGestionPersonal" class="btn btn-volver">
                <i class="fa-solid fa-arrow-left me-1"></i>
                <span>Volver</span>
            </a>

            <div class="d-flex gap-2 flex-wrap responsive-buttons">
                <button id="btnMostrarFiltros" class="btn btn-filtro" onclick="AbrilPanelFiltros('contenedorFiltros')">
                    <i class="fa-solid fa-filter me-1"></i>
                    <span>Filtros</span>
                </button>

                <button class="btn btn-informe" onclick="GenerarInformePdfListadoHistorialPorEmpleado()">
                    <i class="fa-solid fa-file-lines me-1"></i>
                    <span>Generar Informe</span>
                </button>
            </div>
        </div>


        <!--================================ Contenedor Filtros ===================================== -->
        <div id="contenedorFiltros" class="filtros-panel mb-3 d-none">
            <div class="row g-3 align-items-end">

                <div class="col-12 col-md-3">
                    <label for="EmpleadoIdBuscar" class="form-label-fija">Empleado</label>
                    <input type="text" class="form-control filtro-select" id="EmpleadoIdBuscar"
                        placeholder="Buscar..." />
                </div>

                <div class="col-12 col-md-2">
                    <label for="NroLegajoFiltro" class="form-label-fija">Legajo</label>
                    <input type="text" class="form-control filtro-select" id="NroLegajoFiltro"
                        placeholder="Buscar..." />
                </div>

            </div>
        </div>



        <!-- ==================================== Tabla de Datos ===================================== -->
        <div class="table-responsive">
            <table class="table table-bordered table-hover align-middle">
                <thead>
                    <tr>
                        <th class="text-center">Fecha</th>
                        <th class="text-start">Puesto Actual</th>
                        <th class="text-start d-none d-sm-table-cell">Puesto Anterior</th>
                        <th class="text-start d-none d-md-table-cell">Sector Actual</th>
                        <th class="text-start d-none d-md-table-cell">Sector Anterior</th>

                    </tr>
                </thead>
                <tbody id="listadoHistorialPorEmpleado"></tbody>
            </table>
        </div>

    </div>


</div>

<script src="../js/Vistas/resultados/listadoHistorialPorEmpleado.js"></script>
