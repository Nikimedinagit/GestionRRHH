<div class="px-3 py-3">

  <!-- ======================================= Título ====================================== -->
  <div class="mb-3">
    <h3 class="titulo-seccion">Gestor de Ausencias-Tardanzas</h3>
    <p class="text-muted mb-0" style="font-size: 0.95rem;" id="tituloJustificacion">
      Visualiza y gestiona las justificaciones de los empleados.
    </p>
  </div>


  <hr />

  <!--==================================== Contenedor de Botones y Tabla ===================================== -->
  <div style="background-color: white; border-radius: 5px; padding: 10px">

    <div id="fondoOscuro" onclick="cerrarPanelJustificacion()"></div>

    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">

      <button class="btn btn-agregar" onclick="abrirPanelJustificacion()">
        <i class="fa-solid fa-square-plus me-1"></i>
        <span>Nueva Justificación</span>
      </button>


      <div class="d-flex gap-2 flex-wrap responsive-buttons">
        <button id="btnMostrarFiltros" class="btn btn-filtro" onclick="AbrilPanelFiltros('contenedorFiltros')">
          <i class="fa-solid fa-filter me-1"></i>
          <span>Filtros</span>
        </button>

        <button id="btnMostrarGenerar" class="btn btn-informe d-none" onclick="AbrilPanelGenerar('contenedorGenerar')">
          <i class="fa-solid fa-file-lines me-1"></i>
          <span>Generar</span>
        </button>
      </div>
    </div>


    <!-- ================================ Contenedor Generar ===================================== -->
    <div id="contenedorGenerar" class="generar-panel mb-3 d-none">
      <div class="d-flex gap-2 flex-wrap">
        <button class="btn btn-generar-pdf" onclick="GenerarPDF()">
          <i class="fa-solid fa-file-pdf me-1"></i> PDF
        </button>
        <button class="btn btn-generar-excel" onclick="GenerarExcel()">
          <i class="fa-solid fa-file-excel me-1"></i> Excel
        </button>
      </div>
    </div>


    <!-- ================================ Contenedor Filtros ===================================== -->
    <div id="contenedorFiltros" class="filtros-panel mb-3 d-none">
      <div class="row g-3 align-items-end">

        <div class="col-12 col-md-3" id="filtroEmpleado">
          <label for="EmpleadoIdBuscar" class="form-label-fija">Empleado</label>
          <input type="text" class="form-control filtro-select" id="EmpleadoIdBuscar" placeholder="Buscar..." />
        </div>

        <div class="col-12 col-md-3" id="filtroEstado">
          <label for="EstadoJustificacionBuscar" class="form-label-fija">Estado</label>
          <select id="EstadoJustificacionBuscar" class="form-control filtro-select">
            <option value="0">[Todos]</option>
            <option value="1">PENDIENTE</option>
            <option value="2">ABROBADA</option>
            <option value="3">RECHAZADA</option>
          </select>
        </div>

        <div id="horariosInputs" class="col-12 col-md-2" id="filtroFecha">
          <label for="FechaBuscar" class="form-label-fija">Fecha</label>
          <input type="date" class="form-control filtro-select" id="FechaBuscar" />
        </div>

      </div>
    </div>


    <!-- ================================ Tarjetas resumen ===================================== -->
    <div class="d-flex flex-wrap justify-content-between d-none" style="gap: 1rem;"
      id="contenedorEstadisticasJustificaciones">
      <div class="card p-3 border-0 flex-grow-1 card-resumen" style="background-color: #f3f4f6; min-width: 220px;">
        <div class="d-flex align-items-center">
          <div class="bg-primary bg-opacity-10 p-3 me-3">
            <i class="bx bx-file text-primary fs-4"></i>
          </div>
          <div>
            <p class="mb-0 text-muted small">Total justificaciones</p>
            <h5 class="mb-0 fw-bold" id="totalJustificaciones">0</h5>
          </div>
        </div>
      </div>

      <div class="card p-3 border-0 flex-grow-1 card-resumen" style="background-color: #f3f4f6; min-width: 220px;">
        <div class="d-flex align-items-center">
          <div class="bg-info bg-opacity-10 p-3 me-3">
            <i class="bx bx-check-circle text-info fs-4"></i>
          </div>
          <div>
            <p class="mb-0 text-muted small">Aprobadas</p>
            <h5 class="mb-0 fw-bold" id="justificacionesAprobadas">0</h5>
          </div>
        </div>
      </div>

      <div class="card p-3 border-0 flex-grow-1 card-resumen" style="background-color: #f3f4f6; min-width: 220px;">
        <div class="d-flex align-items-center">
          <div class="bg-warning bg-opacity-10 p-3 me-3">
            <i class="bx bx-time-five text-warning fs-4"></i>
          </div>
          <div>
            <p class="mb-0 text-muted small">Pendientes</p>
            <h5 class="mb-0 fw-bold" id="justificacionesPendientes">0</h5>
          </div>
        </div>
      </div>


      <div class="card p-3 border-0 flex-grow-1 card-resumen" style="background-color: #f3f4f6; min-width: 220px;">
        <div class="d-flex align-items-center">
          <div class="bg-danger bg-opacity-10 p-3 me-3">
            <i class="bx bx-x-circle text-danger fs-4"></i>
          </div>
          <div>
            <p class="mb-0 text-muted small">Rechazadas</p>
            <h5 class="mb-0 fw-bold" id="justificacionesRechazadas">0</h5>
          </div>
        </div>
      </div>

    </div>

    <hr style="margin-bottom: 1rem !important; margin-top: 1rem !important;" />


    <!-- ================================ Contenedor de justificaciones ===================================== -->
    <div class="container-fluid">
      <div id="contenedorJustificaciones" class="row">
      </div>
    </div>
  </div>


  <!--==================================== Panel Justificacion ===================================== -->
  <div id="panelJustificacion" aria-modal="true" role="dialog" aria-labelledby="panelTitulo" tabindex="-1" class="w-30">
    <div class="panel-header">
      <h2 id="panelTitulo" class="panel-title">Formulario De Justificaciones</h2>
    </div>
    <div class="panel-body">
      <form id="formJustificacion">
        <input type="hidden" id="IdJustificacion" />
        <div class="invalid-feedback mb-3" id="errorEmpleadoIdJustificacionSinEmpleado"></div>

        <div class="form-grid">
          <div class="form-group position-relative mb-3">
            <textarea name="MotivoJustificacion" id="MotivoJustificacion" class="form-control" rows="1"
              placeholder=" "></textarea>
            <label for="MotivoJustificacion">Motivo</label>
            <div class="invalid-feedback" id="errorMotivoJustificacion"></div>
          </div>

          <div class="form-group position-relative mb-3">
            <input type="date" id="FechaJustificacion" class="form-control" placeholder=" " />
            <label for="FechaJustificacion">Fecha</label>
            <div class="invalid-feedback" id="errorFechaJustificacion"></div>
          </div>

          <div class="form-group position-relative mb-3 d-none" id="seleccionEmpleadoJustificacion">
            <select name="EmpleadoId" id="EmpleadoId" class="form-control" required>
              <option value="" disabled selected>Seleccione</option>
            </select>
            <label for="EmpleadoId">Empleado</label>
            <div class="invalid-feedback" id="errorEmpleadoIdJustificacion"></div>
          </div>

          <div class="form-grid" style="grid-template-columns: 1fr;">
            <div class="form-group position-relative mb-3">
              <input type="file" id="DocumentoAdjunto" class="form-control" name="DocumentoAdjunto" />
              <label for="DocumentoAdjunto">Documento Adjunto</label>
              <div class="invalid-feedback" id="errorDocumentoAdjunto"></div>
              <div id="archivoAdjuntoActual" class="mt-1"></div>
              <div class="invalid-feedback" id="errorArchivoAdjunto"></div>
            </div>
          </div>

        </div>
      </form>
    </div>
    <div class="panel-footer">
      <button class="btn btn-cancelar" onclick="cerrarPanelJustificacion()">Cancelar</button>
      <button type="submit" class="btn btn-guardar" onclick="BuscarJustificacionId()">Guardar</button>
    </div>
  </div>

</div>

<script src="../js/Vistas/estadisticas/estadisticasJustificaciones.js"></script>
<script src="../js/Vistas/justificacion.js"></script>
<script src="../js/Vistas/common/obtenerEmpleado.js"></script>
