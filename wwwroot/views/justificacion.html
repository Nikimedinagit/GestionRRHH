<!-- Contenedor Principal -->
<div class="px-3 py-3">
  <!-- Título -->
  <div class="mb-3">
    <h3 class="titulo-seccion">Seguimiento de Justificaciones</h3>
  </div>

  <hr />

  <!-- Contenedor de Botones y Tabla -->
  <div style="background-color: white; border-radius: 5px; padding: 10px">
    <!-- Fondo Oscuro al Abrir Panel -->
    <div id="fondoOscuro" onclick="cerrarPanelJustificacion()"></div>

    <!-- Contenedor de Acciones (Agregar, Filtrar y Generar Informe) -->
    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
      <!-- Botón Nueva Justificación -->
      <button class="btn btn-agregar" onclick="abrirPanelJustificacion()">
        <i class="fa-solid fa-square-plus me-1"></i>
        <span>Nueva Justificación</span>
      </button>

      <!-- Botones Filtros e Informe -->
      <div class="d-flex gap-2 flex-wrap">
        <button id="btnMostrarFiltros" class="btn btn-filtro" onclick="AbrilPanelFiltros('contenedorFiltros')">
          <i class="fa-solid fa-filter me-1"></i>
          <span>Filtros</span>
        </button>

        <button id="btnMostrarGenerar" class="btn btn-informe" onclick="AbrilPanelGenerar('contenedorGenerar')">
          <i class="fa-solid fa-file-lines me-1"></i>
          <span>Generar</span>
        </button>
      </div>
    </div>

    <!-- Contenedor Generar -->
    <div id="contenedorGenerar" class="generar-panel mb-3 d-none">
      <div class="d-flex gap-2 flex-wrap">
        <button class="btn btn-generar-pdf" onclick="GenerarPDF()">
          <i class="fa-solid fa-file-pdf me-1"></i> PDF
        </button>
        <button class="btn btn-generar-excel" onclick="GenerarExcel()">
          <i class="fa-solid fa-file-excel me-1"></i> Excel
        </button>
        <button class="btn btn-generar-grafico" onclick="GenerarGrafico()">
          <i class="fa-solid fa-chart-column me-1"></i> Gráfico
        </button>
      </div>
    </div>

    <!-- Gráfico -->
    <div id="contenedorGrafico" class="mb-3 mt-3 d-none">
      <canvas id="graficoJustificacion" width="400" height="150"></canvas>
    </div>

    <!-- Tarjetas resumen -->
    <div class="d-flex flex-wrap justify-content-between" style="gap: 1rem;">
      <!-- Total Justificaciones -->
      <div class="card p-3 border-0 flex-grow-1 card-resumen" style="background-color: #f3f4f6; min-width: 220px;">
        <div class="d-flex align-items-center">
          <div class="bg-primary bg-opacity-10 p-3 me-3">
            <i class="bx bx-file text-primary fs-4"></i>
          </div>
          <div>
            <p class="mb-0 text-muted small">Total</p>
            <h5 class="mb-0 fw-bold" id="totalJustificaciones">0</h5>
          </div>
        </div>
      </div>

      <!-- Justificaciones pendientes -->
      <div class="card p-3 border-0 flex-grow-1 card-resumen" style="background-color: #f3f4f6; min-width: 220px;">
        <div class="d-flex align-items-center">
          <div class="bg-warning bg-opacity-10 p-3 me-3">
            <i class="bx bx-time-five text-warning fs-4"></i>
          </div>
          <div>
            <p class="mb-0 text-muted small">Pendientes</p>
            <h5 class="mb-0 fw-bold" id="justificacionesPendientes">0</h5>
          </div>
        </div>
      </div>

      <!-- Justificaciones aprobadas -->
      <div class="card p-3 border-0 flex-grow-1 card-resumen" style="background-color: #f3f4f6; min-width: 220px;">
        <div class="d-flex align-items-center">
          <div class="bg-info bg-opacity-10 p-3 me-3">
            <i class="bx bx-check-circle text-info fs-4"></i>
          </div>
          <div>
            <p class="mb-0 text-muted small">Aprobadas</p>
            <h5 class="mb-0 fw-bold" id="justificacionesAprobadas">0</h5>
          </div>
        </div>
      </div>

      <!-- Justificaciones rechazadas -->
      <div class="card p-3 border-0 flex-grow-1 card-resumen" style="background-color: #f3f4f6; min-width: 220px;">
        <div class="d-flex align-items-center">
          <div class="bg-danger bg-opacity-10 p-3 me-3">
            <i class="bx bx-x-circle text-danger fs-4"></i>
          </div>
          <div>
            <p class="mb-0 text-muted small">Rechazadas</p>
            <h5 class="mb-0 fw-bold" id="justificacionesRechazadas">0</h5>
          </div>
        </div>
      </div>

    </div>

    <hr style="margin-bottom: 1rem;" />

    <!-- Contenedor de justificaciones -->
    <div class="container-fluid">
      <div id="contenedorJustificaciones" class="row">
        <!-- Se cargan dinámicamente -->
      </div>
    </div>
  </div> <!-- ← cierre correcto del contenedor blanco -->

  <!-- Panel Justificacion -->
  <div id="panelJustificacion" aria-modal="true" role="dialog" aria-labelledby="panelTitulo" tabindex="-1" class="w-30">
    <div class="panel-header">
      <h2 id="panelTitulo" class="panel-title">Formulario De Justificaciones</h2>
    </div>
    <div class="panel-body">
      <form id="formJustificacion">
        <input type="hidden" id="IdJustificacion" />
        <div class="form-grid">
          <!-- Nombre -->
          <div class="form-group position-relative mb-3">
            <textarea name="MotivoJustificacion" id="MotivoJustificacion" class="form-control" rows="1" placeholder=" "></textarea>
            <label for="MotivoJustificacion">Motivo</label>
            <div class="invalid-feedback" id="errorMotivoJustificacion"></div>
          </div>

          <!-- Fecha -->
          <div class="form-group position-relative mb-3">
            <input type="date" id="FechaJustificacion" class="form-control" placeholder=" " />
            <label for="FechaJustificacion">Fecha</label>
            <div class="invalid-feedback" id="errorFechaJustificacion"></div>
          </div>

          <!-- Empleado -->
          <div class="form-group position-relative mb-3">
            <select name="EmpleadoId" id="EmpleadoId" class="form-control" required>
              <option value="" disabled selected>Seleccione</option>
            </select>
            <label for="EmpleadoId">Empleado</label>
            <div class="invalid-feedback" id="errorEmpleadoIdJustificacion"></div>
          </div>

          <!-- Documento Adjunto -->
          <div class="form-grid" style="grid-template-columns: 1fr;">
            <div class="form-group position-relative mb-3">
              <input type="file" id="DocumentoDescargable" class="form-control" />
              <label for="DocumentoDescargable">Documento Descargable</label>
              <div class="invalid-feedback" id="errorDocumentoDescargable"></div>
              <div id="archivoAdjuntoActual" class="mt-1"></div>
            </div>
          </div>

        </div>
      </form>
    </div>
    <div class="panel-footer">
      <button class="btn btn-cancelar" onclick="cerrarPanelJustificacion()">Cancelar</button>
      <button type="submit" class="btn btn-guardar" onclick="BuscarJustificacionId()">Guardar</button>
    </div>
  </div>

  <!-- Scripts -->
  <script src="../js/Vistas/justificacion.js"></script>
  <script src="../js/Vistas/common/obtenerEmpleado.js"></script>
</div>
